<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEMIS API Ma'lumotlari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
 body {
 font-family: 'Plus Jakarta Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 background: radial-gradient(1200px 600px at 10% 10%, #ffd7c2 0%, #f9c5b4 45%, #f6b79f 100%);
 min-height: 100vh;
 padding: 24px;
 color: #2b1f1f;
 }
 .glass {
 background: rgba(255, 255, 255, 0.6);
 border: 1px solid rgba(255, 255, 255, 0.6);
 border-radius: 18px;
 box-shadow: 0 20px 60px rgba(47, 29, 29, 0.12);
 backdrop-filter: blur(18px);
 }
 .title {
 font-weight: 800;
 letter-spacing: -0.4px;
 color: #b4533d;
 }
 .btn-peach {
 background: linear-gradient(135deg, #ff8a65, #f97316);
 color: #fff;
 border: none;
 border-radius: 10px;
 font-weight: 700;
 padding: 10px 18px;
 box-shadow: 0 10px 20px rgba(249, 115, 22, 0.25);
 transition: transform 0.2s;
 }
 .btn-peach:hover {
 transform: translateY(-2px);
 color: #fff;
 }
 .btn-secondary {
 background: rgba(107, 74, 68, 0.7);
 color: #fff;
 border: none;
 border-radius: 8px;
 font-weight: 600;
 padding: 8px 16px;
 }
 .input-glass {
 background: rgba(255, 255, 255, 0.8);
 border: 1px solid rgba(255, 255, 255, 0.6);
 border-radius: 12px;
 }
 .result-box {
 background: rgba(255, 255, 255, 0.75);
 border: 1px solid rgba(255, 255, 255, 0.6);
 border-radius: 16px;
 padding: 16px;
 min-height: 120px;
 max-height: 500px;
 overflow-y: auto;
 white-space: pre-wrap;
 word-break: break-word;
 font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
 font-size: 0.85rem;
 }
 .hint {
 color: #6b4a44;
 font-size: 0.9rem;
 }
</style>
</head>
<body>
<div class="container">
<div class="glass p-4 mb-4">
<div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
<div>
<h1 class="title mb-1">HEMIS API Ma'lumotlari</h1>
<div class="hint">BUXDU universitetining Backend API orqali tartibli ma'lumot olish</div>
</div>
<a href="/" class="btn btn-peach">Orqaga</a>
</div>
</div>

<!-- FILTRLAR BLOKI -->
<div class="glass p-4 mb-4">
<h5 class="mb-3" style="color: #b4533d;">Ma'lumot Oqimi</h5>
<div class="row g-3 mb-4">
<div class="col-md-6">
<label class="form-label fw-bold">Tanlang:</label>
<select id="dataFlowSelect" class="form-select input-glass">
<option value="">-- Tanlang --</option>
<option value="students">Talaba ishlari (Talabalar)</option>
<option value="faculty">O'quv ishlari (Fakultetlar)</option>
</select>
</div>
 
<!-- Talaba ishlari -->
<div class="col-md-6" id="studentSection" style="display: none;">
<label class="form-label fw-bold">Talaba Tanlang</label>
<select id="studentSelect" class="form-select input-glass">
<option value="">Talabalar yuklanmoqda...</option>
</select>
</div>
 
<!-- O'quv ishlari -->
<div class="col-md-6" id="facultySection" style="display: none;">
<label class="form-label fw-bold">Fakultet Tanlang</label>
<select id="facultySelect" class="form-select input-glass">
<option value="">Fakultetlar yuklanmoqda...</option>
</select>
</div>
</div>
</div>

<!-- API PARAMETRLARI BLOKI -->
<div class="glass p-4 mb-4">
<h5 class="mb-3" style="color: #b4533d;">API Parametrlari</h5>
<div class="row g-3">
<input id="baseUrl" type="hidden" value="https://student.buxdu.uz" />
<input id="token" type="hidden" value="0NTb7ZpS0tkm2b4MmqVBL3JrtCI-UVJm" />
 
<div class="col-md-12">
<label class="form-label fw-bold">Endpoint tanlang</label>
<select id="endpointSelect" class="form-select input-glass">
<optgroup label="Talabalar">
<option value="/rest/v1/data/student-list">Talabalar ro'yxati</option>
<option value="/rest/v1/data/student-info">Talaba ma'lumotlari</option>
<option value="/rest/v1/data/student-stats">Talabalar statistikasi</option>
</optgroup>
<optgroup label="Fakultetlar">
<option value="/rest/v1/data/department-list">Bo'limlar ro'yxati</option>
<option value="/rest/v1/data/specialty-list">Mutaxassisliklar</option>
<option value="/rest/v1/data/group-list">Guruhlar</option>
</optgroup>
</select>
</div>
 
<div class="col-md-3">
<label class="form-label">Limit</label>
<input id="limit" type="number" class="form-control input-glass" value="50" min="1" max="200" />
</div>
 
<div class="col-md-9">
<label class="form-label">Qo'shimcha parametrlar (JSON)</label>
<input id="params" class="form-control input-glass" placeholder='{}' />
</div>
 
<div class="col-md-12 d-flex gap-2">
<button id="loadBtn" class="btn btn-peach flex-grow-1">Ma'lumot olish</button>
<button id="copyBtn" class="btn btn-secondary" style="display: none;">Nusxa</button>
<button id="downloadBtn" class="btn btn-secondary" style="display: none;">Yuklab olish</button>
</div>
</div>
</div>

<!-- NATIJA BLOKI -->
<div class="glass p-4">
<div class="d-flex align-items-center justify-content-between mb-2">
<div class="fw-bold">Natija</div>
<div id="status" class="hint">Tayyor</div>
</div>
<div id="result" class="result-box">Natija shu yerda ko'rinadi.</div>
</div>
</div>

<script>
 const loadBtn = document.getElementById('loadBtn');
 const copyBtn = document.getElementById('copyBtn');
 const downloadBtn = document.getElementById('downloadBtn');
 const statusEl = document.getElementById('status');
 const resultEl = document.getElementById('result');
 const endpointSelect = document.getElementById('endpointSelect');
 const dataFlowSelect = document.getElementById('dataFlowSelect');
 const studentSection = document.getElementById('studentSection');
 const facultySection = document.getElementById('facultySection');
 const studentSelect = document.getElementById('studentSelect');
 const facultySelect = document.getElementById('facultySelect');

 let lastResult = null;
 let studentsData = {};
 let facultiesData = {};

 // Talabalar yuklash
 async function loadStudents() {
 try {
 const response = await fetch('/api/hemis/proxy', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 base_url: 'https://student.buxdu.uz',
 token: '0NTb7ZpS0tkm2b4MmqVBL3JrtCI-UVJm',
 path: '/rest/v1/data/student-list',
 params: { limit: 200 }
 })
 });
 const data = await response.json();
 
 if (data.data && Array.isArray(data.data)) {
 studentsData = {};
 studentSelect.innerHTML = '<option value="">Talabani tanlang</option>';
 
 data.data.forEach(student =>{
 studentsData[student.id] = student;
 const option = document.createElement('option');
 option.value = student.id;
 option.textContent = student.full_name || student.name || 'Talaba ' + student.id;
 studentSelect.appendChild(option);
 });
 console.log('Talabalar yuklandi: ' + data.data.length);
 }
 } catch (e) {
 console.error('Talaba yuklash xatosi:', e);
 }
 }

 // Fakultetlar yuklash
 async function loadFaculties() {
 try {
 const response = await fetch('/api/hemis/proxy', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 base_url: 'https://student.buxdu.uz',
 token: '0NTb7ZpS0tkm2b4MmqVBL3JrtCI-UVJm',
 path: '/rest/v1/data/department-list',
 params: { limit: 200 }
 })
 });
 const data = await response.json();
 
 if (data.data && Array.isArray(data.data)) {
 facultiesData = {};
 facultySelect.innerHTML = '<option value="">Fakultetni tanlang</option>';
 
 data.data.forEach(faculty =>{
 if (faculty.status !== 0) {
 facultiesData[faculty.id] = faculty;
 const option = document.createElement('option');
 option.value = faculty.id;
 option.textContent = faculty.name || faculty.title || 'Fakultet ' + faculty.id;
 facultySelect.appendChild(option);
 }
 });
 console.log('Fakultetlar yuklandi: ' + Object.keys(facultiesData).length);
 }
 } catch (e) {
 console.error('Fakultet yuklash xatosi:', e);
 }
 }

 // Oqim tanlandi
 dataFlowSelect.addEventListener('change', (e) =>{
 if (e.target.value === 'students') {
 studentSection.style.display = 'block';
 facultySection.style.display = 'none';
 loadStudents();
 } else if (e.target.value === 'faculty') {
 studentSection.style.display = 'none';
 facultySection.style.display = 'block';
 loadFaculties();
 } else {
 studentSection.style.display = 'none';
 facultySection.style.display = 'none';
 }
 });

 // Ma'lumot olish
 loadBtn.addEventListener('click', async () =>{
 const base_url = document.getElementById('baseUrl').value.trim();
 const token = document.getElementById('token').value.trim();
 const endpoint = endpointSelect.value.trim();
 const limit = Number(document.getElementById('limit').value || 50);
 const paramsRaw = document.getElementById('params').value.trim();

 if (!base_url || !token || !endpoint) {
 statusEl.textContent = 'Xato: maydonlarni to\'ldiring';
 return;
 }

 statusEl.textContent = 'Yuklanmoqda...';
 resultEl.textContent = 'Kutangyoz...';
 copyBtn.style.display = 'none';
 downloadBtn.style.display = 'none';

 try {
 let params = { limit: limit };
 
 // Filtrlarni qo'shish
 if (dataFlowSelect.value === 'students' && studentSelect.value) {
 params._student_id = parseInt(studentSelect.value);
 } else if (dataFlowSelect.value === 'faculty' && facultySelect.value) {
 params._department = parseInt(facultySelect.value);
 }
 
 // Qo'shimcha parametrlar
 if (paramsRaw && paramsRaw !== '{}') {
 try {
 const customParams = JSON.parse(paramsRaw);
 params = { ...params, ...customParams };
 } catch (e) {
 statusEl.textContent = 'JSON xato';
 return;
 }
 }
 
 const response = await fetch('/api/hemis/proxy', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ base_url, token, path: endpoint, params })
 });
 
 const data = await response.json();

 if (!response.ok) {
 statusEl.textContent = 'API Xato: ' + response.status;
 resultEl.textContent = JSON.stringify(data, null, 2);
 lastResult = null;
 return;
 }

 lastResult = data;
 let count = 0;
 if (data.data) {
 if (Array.isArray(data.data)) count = data.data.length;
 else if (typeof data.data === 'object') count = Object.keys(data.data).length;
 }

 statusEl.textContent = 'Tayyor (' + count + ' ta)';
 resultEl.textContent = JSON.stringify(data, null, 2);
 copyBtn.style.display = 'inline-block';
 downloadBtn.style.display = 'inline-block';
 } catch (err) {
 statusEl.textContent = 'Xato';
 resultEl.textContent = String(err);
 }
 });

 // Nusxa
 copyBtn.addEventListener('click', () =>{
 if (lastResult) {
 navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2));
 copyBtn.textContent = 'OK!';
 setTimeout(() =>copyBtn.textContent = 'Nusxa', 2000);
 }
 });

 // Yuklab olish
 downloadBtn.addEventListener('click', () =>{
 if (lastResult) {
 const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: 'application/json' });
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url;
 a.download = 'data_' + Date.now() + '.json';
 a.click();
 URL.revokeObjectURL(url);
 }
 });
</script>
</body>
</html>
